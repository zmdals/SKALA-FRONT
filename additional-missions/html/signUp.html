<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
    <title>회원가입</title>
</head>
<body>
    <header>
        <h1>📋 회원가입</h1>
        <p>SKALA-FRONT 회원가입을 환영합니다.</p>
    </header>
    <hr>
    <div class ="container">
        <main id = "signUp">
            <form action = "signUpResult.html" method = "get">
                <fieldset>
                    <legend>계정 정보</legend>
                    <p>
                        <label for="userName">이름: </label>
                        <input type="text" id="userName" name="userName" required>
                    </p>
                    <p>
                        <label for="userId">아이디: </label>
                        <input type="text" id="userId" name="userId" pattern = "[0-9a-z]{4,12}" placeholder="4~12자 영문(소문자)/숫자" required> (필수)
                    </p>
                    <p>
                        <label for="userPw">바말번호: </label>
                        <input type="password" id="userPw" name="userPw" minlength="8" placeholder="8자 이상 입력" required> (필수)
                    </p>
                    <p>
                        <label for="userEmail">이메일: </label>
                        <input type="text" id="userEmail" name="userEmail" placeholder="example" required> @
                        <select name="domain">
                            <option value="direct">직접입력</option>
                            <option value="naver.com">naver.com</option>
                            <option value="gmail.com">gmail.com</option>
                            <option value="daum.net">daum.net</option>
                        </select>
                    </p>
                    <p>
                        <label for="userTel">전화번호: </label>
                        <input type="tel" id="userTel" name="userTel" pattern="[0-9]{3}-[0-9]{4}-[0-9]{4}" placeholder="예)010-1234-5678">
                    </p>
                    <p>
                        <br>
                        <label for = "contract">[필수] 전체 약관 및 개인정보 수집·이용에 모두 동의합니다.</label>
                        <input type = "checkbox" id = "contract" name = "contract" required>
                    </p>
                </fieldset>
                <br>
                <fieldset>
                    <legend>개인 프로필 정보</legend>
                    <p>
                        <label for="userBirth">생년월일: </label>
                        <input type="date" id="userBirth" name="userBirth">
                    </p>
                    <p>
                        성별: 
                        <label><input type="radio" name="userGender" value = "male" checked>남성</label>
                        <label><input type="radio" name="userGender" value = "female">여성</label>
                        <label><input type="radio" name="userGender" value = "none">선택안함</label>
                    </p>
                    <p>
                        관심 분야 (중복 선택 가능): <br>
                        <label><input type="checkbox" name="interest" value = "frontend">웹 프론트엔드 (Vue.js/HTML)</label><br>
                        <label><input type="checkbox" name="interest" value = "uiux">UI/UX 디자인 표준</label><br>
                        <label><input type="checkbox" name="interest" value = "backend">백엔드 & 데이터베이스</label><br>
                        <label><input type="checkbox" name="interest"value = "devops">클라우드 & 인프라</label>
                    </p>
                    <p>
                        가입 경로: 
                        <select name="route">
                            <option value = "none">선택해주세요</option>
                            <option value = "instagram">인스타그램</option>
                            <option value = "youtube">유튜브</option>
                            <option value = "theother">그 외</option>
                        </select>
                    </p>
                    <p>
                        거주 지역: 
                        <select name="userRegion">
                            <option value="none">선택해주세요</option>
                            <option value="seoul">서울특별시</option>
                            <option value="busan">부산광역시</option>
                            <option value="daegu">대구광역시</option>
                            <option value="incheon">인천광역시</option>
                            <option value="gwangju">광주광역시</option>
                            <option value="daejeon">대전광역시</option>
                            <option value="ulsan">울산광역시</option>
                            <option value="sejong">세종특별자치시</option>
                            <option value="gyeonggi">경기도</option>
                            <option value="gangwon">강원특별자치도</option>
                            <option value="chungbuk">충청북도</option>
                            <option value="chungnam">충청남도</option>
                            <option value="jeonbuk">전북특별자치도</option>
                            <option value="jeonnam">전라남도</option>
                            <option value="gyeongbuk">경상북도</option>
                            <option value="gyeongnam">경상남도</option>
                            <option value="jeju">제주특별자치도</option>
                        </select>
                    </p>
                </fieldset>
                <br>
                <fieldset>
                    <legend>자기소개</legend>
                    <p>
                        <label for="intro">나를 표현하는 한 줄 소개 또는 가입 인사:</label><br>
                        <textarea id="intro" name="intro" rows = "5" cols ="50" placeholder="여기에 내용을 입력하세요(최대 200자)"></textarea>
                    </p>
                </fieldset><br>
                <p>
                    <input type = "submit" value="동의하고 회원가입">
                    <input type = "reset" value="다시 작성">
                </p>
            </form>
        </main>
        <footer>
            <p>2026 SKALA-FRONT - Seungmin Lim</p>
        </footer>
    </div>
</body>
</html>
